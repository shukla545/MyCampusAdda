<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <title>Page not found | CampusNest</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f172a;
        background: #f8fafc;
      }
      main {
        max-width: 560px;
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        background: #fff;
        padding: 32px;
        text-align: center;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 12px 0;
        font-size: clamp(32px, 8vw, 54px);
      }
      p {
        color: #475569;
        line-height: 1.7;
      }
      a {
        display: inline-block;
        margin: 8px;
        border-radius: 14px;
        padding: 12px 18px;
        background: #1e3566;
        color: #fff;
        font-weight: 800;
        text-decoration: none;
      }
      a.secondary {
        background: #eef3fb;
        color: #1e3566;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>404 error</strong>
      <h1>Page not found</h1>
      <p>This CampusNest page may have moved or the link may be incorrect. You can still browse the TCET marketplace or return home.</p>
      <a href="/">Go home</a>
      <a class="secondary" href="/marketplace">Open marketplace</a>
    </main>
  </body>
</html>
